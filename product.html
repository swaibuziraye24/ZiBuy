<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZiBuy Product</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    font-family:Arial;
    margin:0;
    background:#f5f5f5;
}

.product-page{
    max-width:1200px;
    margin:auto;
    padding:20px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
    background:white;
    margin-top:30px;
    border-radius:14px;
}

.product-page img{
    width:100%;
    border-radius:14px;
}

.product-details h1{
    margin-top:0;
}

.product-price{
    color:#ff6600;
    font-size:32px;
    font-weight:bold;
}

.buy-btn{
    width:100%;
    padding:16px;
    border:none;
    border-radius:12px;
    background:#ff6600;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

@media(max-width:900px){

    .product-page{
        grid-template-columns:1fr;
    }

}

</style>

</head>

<body>

<div class="product-page">

    <div>

        <img id="product-image">

    </div>

    <div class="product-details">

        <h1 id="product-name"></h1>

        <p
            class="product-price"
            id="product-price"
        ></p>

        <p>
            High quality product from ZiBuy marketplace.
        </p>

        <button
            class="buy-btn"
            id="buy-btn"
        >
            Add To Cart
        </button>

    </div>

</div>

<script type="module" src="product.js"></script>

</body>
</html>
