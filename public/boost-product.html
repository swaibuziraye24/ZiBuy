<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boost Product — ZiBuy</title>

<style>
body{
  margin:0;
  padding:20px;
  background:#f5f5f5;
  font-family:Arial,sans-serif;
}

.boost-wrap{max-width:600px;margin:auto;}

.page-title{font-size:32px;font-weight:800;margin-bottom:10px;}
.page-sub{color:#666;margin-bottom:30px;}

.boost-card{
  background:white;
  border-radius:18px;
  padding:22px;
  border:2px solid transparent;
  cursor:pointer;
  transition:0.2s;
}

.boost-card:hover{transform:translateY(-3px);border-color:#ff6600;}
.boost-card.active{border-color:#ff6600;background:#fff7f2;}

.boost-top{display:flex;justify-content:space-between;}
.boost-days{font-size:22px;font-weight:800;}
.boost-price{font-size:24px;font-weight:900;color:#ff6600;}

.pay-btn{
  width:100%;
  margin-top:25px;
  background:#ff6600;
  color:white;
  border:none;
  padding:16px;
  border-radius:14px;
  font-size:16px;
  font-weight:800;
  cursor:pointer;
}

.pay-btn:disabled{opacity:0.6;cursor:not-allowed;}

.selected-label{margin-top:20px;font-weight:700;color:#ff6600;}
.loading{text-align:center;padding:40px;}
</style>
</head>

<body>

<div class="boost-wrap">
  <div class="page-title">⭐ Boost Your Ad</div>
  <div class="page-sub">Get more visibility, more clicks and more buyers.</div>

  <div id="product-info" class="loading">Loading product...</div>

  <div class="boost-card" onclick="selectPlan(7,5000,this)">
    <div class="boost-top">
      <div class="boost-days">7 Days</div>
      <div class="boost-price">UGX 5,000</div>
    </div>
  </div>

  <div class="boost-card" onclick="selectPlan(14,8000,this)">
    <div class="boost-top">
      <div class="boost-days">14 Days</div>
      <div class="boost-price">UGX 8,000</div>
    </div>
  </div>

  <div class="boost-card" onclick="selectPlan(30,15000,this)">
    <div class="boost-top">
      <div class="boost-days">30 Days</div>
      <div class="boost-price">UGX 15,000</div>
    </div>
  </div>

  <div id="selected-plan" class="selected-label">No plan selected</div>

  <button class="pay-btn" onclick="startBoost()">
    🚀 Boost Now
  </button>
</div>

<script type="module">
import { db, doc, getDoc } from "./firebase.js";
import { boostAd } from "./premium-ads.js";

const productId = new URLSearchParams(window.location.search).get("productId");

let selectedDays = null;
let selectedPrice = null;

/* LOAD PRODUCT */
async function loadProduct() {
  if (!productId) {
    document.getElementById("product-info").innerHTML = "❌ Missing product ID";
    return;
  }

  const snap = await getDoc(doc(db, "products", productId));

  if (!snap.exists()) {
    document.getElementById("product-info").innerHTML = "❌ Product not found";
    return;
  }

  const p = snap.data();

  document.getElementById("product-info").innerHTML = `
    <div style="background:white;padding:18px;border-radius:16px;margin-bottom:20px">
      <div style="display:flex;gap:12px">
        <img src="${p.images?.[0] || ''}" style="width:80px;height:80px;object-fit:cover;border-radius:10px">
        <div>
          <h3>${p.name}</h3>
          <b style="color:#ff6600">UGX ${Number(p.price || 0).toLocaleString()}</b>
        </div>
      </div>
    </div>
  `;
}

window.selectPlan = function(days, price, el){
  selectedDays = days;
  selectedPrice = price;

  document.querySelectorAll(".boost-card").forEach(c => c.classList.remove("active"));
  el.classList.add("active");

  document.getElementById("selected-plan").innerText =
    `Selected: ${days} days — UGX ${price.toLocaleString()}`;
};

window.startBoost = async function(){

  if (!selectedDays) {
    alert("Select a plan first");
    return;
  }

  const btn = document.querySelector(".pay-btn");
  btn.disabled = true;
  btn.innerText = "Processing...";

  const success = await boostAd(productId, selectedDays, selectedPrice);

  if (success) {
    alert("Boost successful!");
    window.location.href = "dashboard.html?tab=my-ads";
  } else {
    alert("Boost failed");
  }

  btn.disabled = false;
  btn.innerText = "🚀 Boost Now";
};

loadProduct();
</script>

<script src="nav.js"></script>

</body>
</html>
