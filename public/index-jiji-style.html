<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0066cc">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>ZiBuy — Buy & Sell in Uganda</title>
  <link rel="stylesheet" href="jiji-style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<!-- ============ HEADER ============ -->
<header class="jiji-header">
  <div class="header-top">
    <a href="index.html" class="jiji-logo">Zi<span>Buy</span></a>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
  </div>

  <div class="search-container">
    <input type="text" id="search-bar" placeholder="What are you looking for?" class="search-input">
    <button class="search-btn" onclick="performSearch()">🔍</button>
  </div>

  <div class="header-actions" id="header-actions" style="display:none">
    <button class="header-btn" id="account-btn" onclick="window.location.href='#auth'" style="display:none">👤 Account</button>
    <button class="header-btn" id="post-ad-btn" onclick="window.location.href='post-ad.html'" style="display:none">+ Post Ad</button>
    <button class="header-btn" id="dashboard-btn" onclick="window.location.href='dashboard.html'" style="display:none">📊 Dashboard</button>
    <button class="header-btn" onclick="openAdminLoginModal()">🔑 Admin</button>
  </div>
</header>

<!-- ============ FEATURED/CAROUSEL ============ -->
<section class="featured-section">
  <div class="carousel-container">
    <div id="featured-carousel" class="carousel">
      <!-- Products added via JS -->
    </div>
    <div class="carousel-dots" id="carousel-dots"></div>
  </div>
</section>

<!-- ============ QUICK FILTERS ============ -->
<section class="quick-filters">
  <div class="filter-chip" onclick="filterByLocation('Kampala')">📍 Kampala</div>
  <div class="filter-chip" onclick="filterByLocation('Jinja')">📍 Jinja</div>
  <div class="filter-chip" onclick="filterByLocation('')">📍 All Uganda</div>
  <div class="filter-chip" onclick="window.location.href='advanced-search.html'">⚙️ More Filters</div>
</section>

<!-- ============ CATEGORIES ============ -->
<section class="categories-section">
  <h3 style="padding:0 16px;margin:16px 0 12px">Browse Categories</h3>
  <div class="categories-grid">
    <div class="category-card" onclick="filterByCategory('phones')">📱<p>Phones</p></div>
    <div class="category-card" onclick="filterByCategory('laptops')">💻<p>Laptops</p></div>
    <div class="category-card" onclick="filterByCategory('vehicles')">🚗<p>Vehicles</p></div>
    <div class="category-card" onclick="filterByCategory('realestate')">🏠<p>Real Estate</p></div>
    <div class="category-card" onclick="filterByCategory('furniture')">🪑<p>Furniture</p></div>
    <div class="category-card" onclick="filterByCategory('fashion')">👕<p>Fashion</p></div>
    <div class="category-card" onclick="filterByCategory('electronics')">⚡<p>Electronics</p></div>
    <div class="category-card" onclick="filterByCategory('services')">🛠️<p>Services</p></div>
  </div>
</section>

<!-- ============ PRODUCTS GRID ============ -->
<section class="products-section">
  <div class="section-header">
    <h2>Latest Listings</h2>
    <a href="advanced-search.html" class="view-all">View All →</a>
  </div>
  <div id="products-grid" class="products-grid">
    <!-- Products added via JS -->
  </div>
</section>

<!-- ============ FLOATING POST BUTTON ============ -->
<a href="post-ad.html" class="fab-button" id="fab-post-btn" style="display:none" title="Post your ad">
  <span style="font-size:24px">+</span>
</a>

<!-- ============ BOTTOM NAVIGATION (Mobile) ============ -->
<nav class="bottom-nav" id="bottom-nav">
  <button class="nav-item active" onclick="goHome()">
    <span style="font-size:20px">🏠</span>
    <span>Home</span>
  </button>
  <button class="nav-item" onclick="window.location.href='advanced-search.html'">
    <span style="font-size:20px">🔍</span>
    <span>Search</span>
  </button>
  <button class="nav-item" id="nav-post-btn" onclick="window.location.href='post-ad.html'" style="display:none">
    <span style="font-size:20px">➕</span>
    <span>Post</span>
  </button>
  <button class="nav-item" onclick="window.location.href='messages.html'">
    <span style="font-size:20px">💬</span>
    <span>Messages</span>
  </button>
  <button class="nav-item" id="nav-account-btn" onclick="window.location.href='dashboard.html'" style="display:none">
    <span style="font-size:20px">👤</span>
    <span>Account</span>
  </button>
</nav>

<!-- ============ MODALS ============ -->
<div id="auth-modal" class="modal">
  <div class="modal-box" style="max-width:400px">
    <div class="modal-header">
      <h2>Login / Sign Up</h2>
      <button class="modal-close" onclick="closeModal('auth-modal')">×</button>
    </div>
    <div id="auth-content"></div>
  </div>
</div>

<div id="admin-modal" class="modal">
  <div class="modal-box" style="max-width:400px">
    <div class="modal-header">
      <h2>🔑 Admin Login</h2>
      <button class="modal-close" onclick="closeModal('admin-modal')">×</button>
    </div>
    <input type="email" id="admin-email" placeholder="Admin Email" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin:12px 0">
    <input type="password" id="admin-password" placeholder="Password" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin:12px 0">
    <button class="btn-primary" onclick="adminLogin()" style="width:100%">Login</button>
  </div>
</div>

<div id="overlay" class="overlay" onclick="closeAllModals()"></div>

<!-- ============ SCRIPTS ============ -->
<div id="toast-container" class="toast-container"></div>

<script type="module" src="jiji-app.js"></script>
</body>
</html>
