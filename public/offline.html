<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ff6600">
  <title>Offline — ZiBuy</title>
  <style>
    * { margin:0;padding:0;box-sizing:border-box; }
    body { font-family:'Segoe UI',Arial,sans-serif;background:#f7f8fa;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center; }
    .logo { font-size:32px;font-weight:900;color:#ff6600;margin-bottom:32px;letter-spacing:-1px; }
    .logo span { color:#111827; }
    h1 { font-size:22px;font-weight:800;color:#111827;margin-bottom:10px; }
    p  { font-size:14px;color:#6b7280;line-height:1.6;max-width:300px;margin-bottom:8px; }
    .retry-btn { margin-top:28px;background:#ff6600;color:white;border:none;padding:14px 32px;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer; }
    .links { margin-top:32px;background:white;border-radius:14px;padding:16px 20px;box-shadow:0 2px 12px rgba(0,0,0,0.07);max-width:340px;width:100%; }
    .links h3 { font-size:14px;font-weight:800;color:#111827;margin-bottom:10px; }
    .links a { display:block;padding:10px 0;color:#ff6600;font-weight:700;font-size:14px;text-decoration:none;border-bottom:1px solid #f0f0f0; }
    .links a:last-child { border-bottom:none; }
  </style>
</head>
<body>
  <div class="logo">Zi<span>Buy</span></div>
  <div style="font-size:72px;margin-bottom:20px">📡</div>
  <h1>You're Offline</h1>
  <p>No internet connection right now.</p>
  <p>Check your Wi-Fi or mobile data and try again.</p>
  <button class="retry-btn" onclick="window.location.reload()">🔄 Try Again</button>
  <div class="links">
    <h3>📱 Cached Pages</h3>
    <a href="/index.html">🏠 Homepage</a>
    <a href="/dashboard.html">📊 Dashboard</a>
    <a href="/messages.html">💬 Messages</a>
    <a href="/shops.html">🏪 Shops</a>
  </div>
</body>
</html>
