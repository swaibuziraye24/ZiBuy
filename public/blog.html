<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ff6600">
  <title>ZiBuy Blog — Tips, News & Guides for Uganda</title>
  <link rel="stylesheet" href="style.css">

  <meta charset="UTF-8">

<title>ZiBuy Blog - Buy & Sell in Uganda</title>

<meta name="description"
content="ZiBuy Blog helps Ugandans buy, sell, market products and grow businesses online.">

<meta name="keywords"
content="Uganda marketplace, buy and sell Uganda, ZiBuy, online shopping Uganda, business tips Uganda">

<meta name="author"
content="ZiBuy Uganda">

<meta property="og:type"
content="website">

<meta property="og:title"
content="ZiBuy Blog">

<meta property="og:description"
content="Latest marketplace news, selling tips and business growth strategies in Uganda.">

<meta property="og:image"
content="https://zibuy-5deae.web.app/icons/icon-512.png">

<meta property="og:url"
content="https://zibuy-5deae.web.app/blog.html">

<meta name="twitter:card"
content="summary_large_image">
  <style>
    .blog-hero {
      background: linear-gradient(135deg, #ff6600, #ff9900);
      color: white;
      padding: 48px 20px;
      text-align: center;
    }
    .blog-hero h1 { font-size: clamp(26px,4vw,38px); font-weight: 900; margin: 0 0 8px; }
    .blog-hero p  { font-size: 14px; opacity: .92; max-width: 480px; margin: 0 auto; }

    .blog-wrap { max-width: 1100px; margin: 0 auto; padding: 32px 20px 80px; }

    .blog-filters {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px;
      overflow-x: auto; scrollbar-width: none;
    }
    .blog-filters::-webkit-scrollbar { display: none; }
    .blog-filter-btn {
      flex-shrink: 0;
      border: 1.5px solid #e5e7eb; background: white;
      padding: 8px 16px; border-radius: 20px;
      font-size: 13px; font-weight: 700; color: #374151;
      cursor: pointer; font-family: inherit; transition: .15s;
    }
    .blog-filter-btn.active { background: #ff6600; color: white; border-color: #ff6600; }
    .blog-filter-btn:hover:not(.active) { border-color: #ff6600; color: #ff6600; }

    .blog-featured {
      display: grid; grid-template-columns: 1.3fr 1fr; gap: 24px;
      background: white; border-radius: 18px; overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08); margin-bottom: 36px;
      cursor: pointer;
    }
    .blog-featured-img { height: 320px; background: #f3f4f6; overflow: hidden; }
    .blog-featured-img img { width: 100%; height: 100%; object-fit: cover; }
    .blog-featured-body { padding: 28px 28px 28px 0; display: flex; flex-direction: column; justify-content: center; }
    .blog-cat-badge {
      display: inline-block; background: #fff4ee; color: #ff6600;
      padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 800;
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; width: fit-content;
    }
    .blog-featured-body h2 { font-size: 24px; font-weight: 800; color: #111827; margin: 0 0 10px; line-height: 1.3; }
    .blog-featured-body p { font-size: 14px; color: #6b7280; line-height: 1.7; margin: 0 0 16px; }
    .blog-meta { display: flex; align-items: center; gap: 12px; font-size: 12px; color: #9ca3af; }
    .blog-author-avatar {
      width: 28px; height: 28px; border-radius: 50%; background: #ff6600;
      color: white; display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 12px; flex-shrink: 0;
    }

    .blog-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 22px;
    }
    .blog-card {
      background: white; border-radius: 16px; overflow: hidden;
      box-shadow: 0 2px 14px rgba(0,0,0,0.06); cursor: pointer;
      transition: all .2s; display: flex; flex-direction: column;
    }
    .blog-card:hover { transform: translateY(-4px); box-shadow: 0 8px 28px rgba(0,0,0,0.12); }
    .blog-card-img { height: 170px; background: #f3f4f6; overflow: hidden; }
    .blog-card-img img { width: 100%; height: 100%; object-fit: cover; transition: .3s; }
    .blog-card:hover .blog-card-img img { transform: scale(1.05); }
    .blog-card-body { padding: 18px; flex: 1; display: flex; flex-direction: column; }
    .blog-card-body h3 { font-size: 16px; font-weight: 800; color: #111827; margin: 0 0 8px; line-height: 1.35; }
    .blog-card-body p { font-size: 13px; color: #6b7280; line-height: 1.6; margin: 0 0 14px; flex: 1; }

    .blog-empty { text-align: center; padding: 80px 20px; color: #9ca3af; }
    .blog-empty .icon { font-size: 56px; margin-bottom: 16px; }

    .blog-skeleton { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 14px rgba(0,0,0,0.06); }
    .blog-skeleton-img { height: 170px; background: linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%); background-size:200% 100%; animation: shimmer 1.5s infinite; }
    .blog-skeleton-body { padding: 18px; }
    .blog-skeleton-line { height: 12px; border-radius: 6px; background: linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%); background-size:200% 100%; animation: shimmer 1.5s infinite; margin-bottom: 10px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    @media (max-width: 768px) {
      .blog-featured { grid-template-columns: 1fr; }
      .blog-featured-img { height: 220px; }
      .blog-featured-body { padding: 22px; }
      .blog-featured-body h2 { font-size: 19px; }
    }
  </style>
</head>
<body>

<header class="topbar">
  <a href="index.html"><h1 class="logo">Zi<span>Buy</span></h1></a>
  <div class="topbar-actions" style="margin-left:auto">
    <a href="index.html" class="btn btn-dark">← Back to ZiBuy</a>
  </div>
</header>

<div class="blog-hero">
  <h1>📰 ZiBuy Blog</h1>
  <p>Tips, guides and news to help you buy and sell smarter in Uganda</p>
</div>

<div class="blog-wrap">

  <div class="blog-filters" id="blog-filters">
    <button class="blog-filter-btn active" data-cat="all" onclick="filterBlog('all',this)">All Posts</button>
    <button class="blog-filter-btn" data-cat="selling-tips" onclick="filterBlog('selling-tips',this)">Selling Tips</button>
    <button class="blog-filter-btn" data-cat="buying-guide" onclick="filterBlog('buying-guide',this)">Buying Guides</button>
    <button class="blog-filter-btn" data-cat="safety" onclick="filterBlog('safety',this)">Safety</button>
    <button class="blog-filter-btn" data-cat="news" onclick="filterBlog('news',this)">ZiBuy News</button>
    <button class="blog-filter-btn" data-cat="success-stories" onclick="filterBlog('success-stories',this)">Success Stories</button>
  </div>

  <div id="blog-featured-slot"></div>
  <div id="blog-grid" class="blog-grid">
    <div class="blog-skeleton">
      <div class="blog-skeleton-img"></div>
      <div class="blog-skeleton-body">
        <div class="blog-skeleton-line"></div>
        <div class="blog-skeleton-line" style="width:70%"></div>
      </div>
    </div>
    <div class="blog-skeleton">
      <div class="blog-skeleton-img"></div>
      <div class="blog-skeleton-body">
        <div class="blog-skeleton-line"></div>
        <div class="blog-skeleton-line" style="width:70%"></div>
      </div>
    </div>
    <div class="blog-skeleton">
      <div class="blog-skeleton-img"></div>
      <div class="blog-skeleton-body">
        <div class="blog-skeleton-line"></div>
        <div class="blog-skeleton-line" style="width:70%"></div>
      </div>
    </div>
  </div>

</div>

<footer>
  <div class="footer-bottom">© 2026 ZiBuy Uganda · All rights reserved</div>
</footer>

<script type="module" src="blog.js"></script>
<script src="nav.js"></script>
</body>
</html>
