<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Ads — Admin — ZiBuy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <a href="index.html"><h1 class="logo">Zi<span>Buy</span></h1></a>
  <div style="margin-left:auto">
    <button class="btn btn-dark" onclick="window.location.href='index.html'">← Home</button>
  </div>
</header>

<div class="admin-analytics-wrap">
  <h1>⭐ Premium Ads Management</h1>

  <!-- Revenue Stats -->
  <div class="kpi-grid">
    <div class="kpi-card">
      <p class="kpi-label">💰 Total Revenue</p>
      <p class="kpi-value" id="total-revenue">UGX 0</p>
    </div>
    <div class="kpi-card">
      <p class="kpi-label">⭐ Active Boosted Ads</p>
      <p class="kpi-value" id="active-boosts">0</p>
    </div>
    <div class="kpi-card">
      <p class="kpi-label">📊 Avg Clicks/Ad</p>
      <p class="kpi-value" id="avg-clicks">0</p>
    </div>
  </div>

  <!-- Active Premium Ads Table -->
  <div class="analytics-card">
    <h2>Active Premium Ads</h2>
    <table class="analytics-table">
      <thead>
        <tr>
          <th>Product</th>
          <th>Seller</th>
          <th>Duration</th>
          <th>Price</th>
          <th>Clicks</th>
          <th>Expires</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="premium-ads-table"></tbody>
    </table>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>


<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ff6600">
<meta name="apple-mobile-web-app-capable" content="yes">

<script type="module" src="admin-premium.js"></script>
</body>
</html>
