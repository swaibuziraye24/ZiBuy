<!DOCTYPE html>
<html>
<head>
  <title>WhatsApp Admin Dashboard</title>
  <style>
    body { font-family: Arial; background:#f5f5f5; padding:20px; }
    .card { background:white; padding:15px; margin-bottom:10px; border-radius:10px; }
    .btn { padding:8px 12px; margin:5px; border:none; cursor:pointer; border-radius:6px; }
    .send { background:green; color:white; }
    .copy { background:orange; color:white; }
    .bulk { background:#007bff; color:white; }
  </style>

<link rel="stylesheet" href="style.css">

</head>
<body>

<h2>📲 WhatsApp Admin Dashboard</h2>

<button class="btn bulk" onclick="sendAll()">Send All Pending</button>
<button class="btn bulk" onclick="loadReminders()">Refresh</button>

<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  // your config here
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadReminders() {
  const snap = await getDocs(collection(db, "whatsapp_reminders"));
  const list = document.getElementById("list");
  list.innerHTML = "";

  snap.forEach(d => {
    const data = d.data();

    if (data.status === "sent") return;

    const div = document.createElement("div");
    div.className = "card";

    const waLink = data.waLink || 
      `https://wa.me/?text=${encodeURIComponent(data.message)}`;

    div.innerHTML = `
      <p><b>Type:</b> ${data.type}</p>
      <p>${data.message}</p>

      <a class="btn send" target="_blank" href="${waLink}">
        Open WhatsApp
      </a>

      <button class="btn copy" onclick="copyMsg(\`${data.message}\`)">
        Copy Message
      </button>

      <button class="btn send" onclick="markSent('${d.id}')">
        Mark Sent
      </button>
    `;

    list.appendChild(div);
  });
}

window.copyMsg = (msg) => {
  navigator.clipboard.writeText(msg);
  alert("Copied!");
};

window.markSent = async (id) => {
  await updateDoc(doc(db, "whatsapp_reminders", id), {
    status: "sent"
  });
  loadReminders();
};

window.sendAll = async () => {
  const snap = await getDocs(collection(db, "whatsapp_reminders"));

  snap.forEach(d => {
    const data = d.data();
    if (data.status === "sent") return;

    const link = data.waLink || 
      `https://wa.me/?text=${encodeURIComponent(data.message)}`;

    window.open(link, "_blank");
  });
};

window.loadReminders = loadReminders;

loadReminders();
</script>

<script>
  // Don't force reload on back/forward navigation — let browser bfcache work
  window.addEventListener("pageshow", (event) => {
    if (event.persisted) {
      // Page restored from bfcache — just refresh dynamic bits, don't reload everything
      if (typeof window.renderProducts === "function" && window.allProducts?.length) {
        window.renderProducts();
      }
    }
  });
</script>

</body>
</html>
