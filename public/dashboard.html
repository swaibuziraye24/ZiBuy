<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ff6600">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>My Dashboard — ZiBuy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ============ TOP BAR ============ -->
<header class="topbar">
  <a href="index.html"><img src="my_logo.png" alt="ZiBuy" id="secret-admin-trigger" style="height:45px;width:auto;cursor:pointer"></a>
  <div class="topbar-actions" style="margin-left:auto">
    <button class="btn btn-dark" onclick="window.location.href='index.html'">← Home</button>
  </div>
</header>



<!-- ============ DASHBOARD ============ -->
<div class="dashboard-wrap">

  <!-- Sidebar -->
  <aside class="dashboard-sidebar">
    <div class="user-profile-card">
      <div class="user-avatar">👤</div>
      <h3 id="user-email">User</h3>
      <p class="user-email" id="user-email-display">Loading...</p>
    </div>


<button
class="btn btn-orange"
onclick="openMyShop()">
🏪 My Shop
</button>



<button class="btn btn-orange"
  onclick="window.location.href='seller-verification.html'">
  ✅ Get Verified
</button>


    <nav class="dashboard-nav">
      <button class="nav-item active" data-tab="my-ads" onclick="switchTab('my-ads')">
        <span>📦</span>
        <span>My Ads</span>
      </button>
      <button class="nav-item" data-tab="orders" onclick="switchTab('orders')">
        <span>🛒</span>
        <span>My Orders</span>
      </button>
      <button class="nav-item" onclick="switchTab('profile')">
        <span>⚙️</span>
        <span>Settings</span>
      </button>

      <button class="nav-item" onclick="switchTab('analytics')">
        <span>📊</span>
        <span>Analytics</span>
      </button>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="dashboard-content">

    <!-- MY ADS TAB -->
    <div class="dashboard-tab active" id="my-ads-tab">
      <div class="tab-header">
        <h2>📦 My Products</h2>
        <a href="post-ad.html" class="btn btn-orange">+ Post New Ad</a>
      </div>
      <div id="my-ads-list" class="ads-list">
        <p style="text-align:center;padding:40px">Loading your products...</p>
      </div>
    </div>


<!-- ANALYTICS TAB -->
<div class="dashboard-tab" id="analytics-tab" style="display:none">
  <div class="tab-header">
    <h2>📊 Analytics</h2>
    <span id="analytics-plan-badge" style="padding:5px 12px;border-radius:20px;font-size:12px;font-weight:800;background:#f3f4f6;color:#6b7280"></span>
  </div>
  <div id="analytics-container">
    <p style="text-align:center;padding:40px;color:#6b7280">Loading analytics...</p>
  </div>
</div>


    <!-- ORDERS TAB -->
<div class="dashboard-tab" id="orders-tab">
  <div class="tab-header">
    <h2>🛒 My Orders</h2>
  </div>
  <div id="orders-list" class="orders-list">
    <p style="text-align:center;padding:40px">Loading your orders...</p>
  </div>
</div>

<!-- SETTINGS TAB -->
<div class="dashboard-tab" id="profile-tab">
  <div class="tab-header">
    <h2>⚙️ Account Settings</h2>
  </div>
  <div id="profile-settings">
    <p style="text-align:center;padding:40px;color:#6b7280">Loading settings...</p>
  </div>

<!-- Add this inside the profile-settings section -->
<div class="settings-section">
  <h3>📦 Account Type</h3>
  <p id="account-type-display" style="font-size:14px;color:#6b7280;margin-bottom:16px">Loading...</p>
  <button id="upgrade-btn" class="btn btn-orange" onclick="window.location.href='business-plans.html'" style="display:none">
  <h2>🛒 Business Plan</h2>
  </button>
  <p id="business-status" style="font-size:13px;color:#10b981;display:none">✅ Business Account Active</p>
</div>

</div>
  </main>

</div>

<!-- ============ MODALS ============ -->
<div id="overlay" class="overlay" onclick="closeModal()"></div>
<div id="toast-container" class="toast-container"></div>



<script type="module" src="dashboard.js"></script>

<script>
  // Quick test to verify containers exist
  window.testDashboard = function() {
    console.log("✅ my-ads-list exists:", !!document.getElementById("my-ads-list"));
    console.log("✅ orders-list exists:", !!document.getElementById("orders-list"));
    console.log("✅ profile-settings exists:", !!document.getElementById("profile-settings"));
    console.log("✅ my-ads-tab exists:", !!document.getElementById("my-ads-tab"));
    console.log("✅ orders-tab exists:", !!document.getElementById("orders-tab"));
    console.log("✅ profile-tab exists:", !!document.getElementById("profile-tab"));
  };
  
  // Run test after page loads
  window.addEventListener('load', testDashboard);
</script>

<!-- Edit Ad Modal -->
<div id="edit-modal" class="modal">
  <div class="modal-box">
    <div class="modal-header">
      <h2>✏️ Edit Ad</h2>
      <button class="modal-close" onclick="closeEditModal()">×</button>
    </div>
    <input type="text" id="edit-name" placeholder="Product name"
      style="width:100%;padding:12px;border:1.5px solid #e5e7eb;border-radius:10px;font-family:var(--font);font-size:14px;margin-bottom:12px;outline:none">
    <input type="number" id="edit-price" placeholder="Price (UGX)"
      style="width:100%;padding:12px;border:1.5px solid #e5e7eb;border-radius:10px;font-family:var(--font);font-size:14px;margin-bottom:12px;outline:none">
    <textarea id="edit-desc" rows="3" placeholder="Description"
      style="width:100%;padding:12px;border:1.5px solid #e5e7eb;border-radius:10px;font-family:var(--font);font-size:14px;margin-bottom:14px;outline:none;resize:none"></textarea>
    <button onclick="saveEdit()"
      style="width:100%;padding:14px;border:none;border-radius:12px;background:var(--orange);color:white;font-size:15px;font-weight:800;font-family:var(--font);cursor:pointer">
      Save Changes
    </button>
  </div>
</div>


<!-- Edit Product Modal -->
<div id="edit-modal" class="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;justify-content:center;align-items:center;padding:16px">
  <div style="background:white;border-radius:16px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h2 style="margin:0;font-size:18px;font-weight:800">✏️ Edit Ad</h2>
      <button onclick="closeEditModal()" style="background:none;border:none;font-size:24px;cursor:pointer;color:#6b7280">×</button>
    </div>

    <label style="font-size:12px;font-weight:800;text-transform:uppercase;color:#6b7280;letter-spacing:.5px">Product Name</label>
    <input type="text" id="edit-name" placeholder="Product name"
      style="width:100%;padding:12px;border:1.5px solid #e5e7eb;border-radius:10px;font-family:inherit;font-size:14px;margin:6px 0 14px;box-sizing:border-box;outline:none">

    <label style="font-size:12px;font-weight:800;text-transform:uppercase;color:#6b7280;letter-spacing:.5px">Price (UGX)</label>
    <input type="number" id="edit-price" placeholder="Price in UGX"
      style="width:100%;padding:12px;border:1.5px solid #e5e7eb;border-radius:10px;font-family:inherit;font-size:14px;margin:6px 0 14px;box-sizing:border-box;outline:none">

    <label style="font-size:12px;font-weight:800;text-transform:uppercase;color:#6b7280;letter-spacing:.5px">Location</label>
    <select id="edit-location"
      style="width:100%;padding:12px;border:1.5px solid #e5e7eb;border-radius:10px;font-family:inherit;font-size:14px;margin:6px 0 14px;box-sizing:border-box;outline:none;background:white">
      <option value="">Select location</option>
      <option>Kampala</option><option>Wakiso</option><option>Mukono</option>
      <option>Jinja</option><option>Mbarara</option><option>Entebbe</option>
      <option>Gulu</option><option>Mbale</option><option>Masaka</option>
      <option>Fort Portal</option><option>Hoima</option><option>Arua</option><option>Other</option>
    </select>

    <label style="font-size:12px;font-weight:800;text-transform:uppercase;color:#6b7280;letter-spacing:.5px">Description</label>
    <textarea id="edit-desc" rows="4" placeholder="Product description"
      style="width:100%;padding:12px;border:1.5px solid #e5e7eb;border-radius:10px;font-family:inherit;font-size:14px;margin:6px 0 14px;box-sizing:border-box;outline:none;resize:none"></textarea>

    <label style="font-size:12px;font-weight:800;text-transform:uppercase;color:#6b7280;letter-spacing:.5px">Seller Phone / WhatsApp</label>
    <input type="tel" id="edit-phone" placeholder="256701234567"
      style="width:100%;padding:12px;border:1.5px solid #e5e7eb;border-radius:10px;font-family:inherit;font-size:14px;margin:6px 0 20px;box-sizing:border-box;outline:none">

    <div style="display:flex;gap:10px">
      <button onclick="closeEditModal()"
        style="flex:1;padding:14px;border:1.5px solid #e5e7eb;border-radius:10px;background:white;font-family:inherit;font-weight:700;cursor:pointer">
        Cancel
      </button>
      <button id="edit-save-btn" onclick="saveEdit()"
        style="flex:1;padding:14px;border:none;border-radius:10px;background:#ff6600;color:white;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer">
        Save Changes
      </button>
    </div>
  </div>
</div>


<script src="nav.js"></script>

</body>
</html>
