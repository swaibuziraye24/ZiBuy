<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ff6600">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>My Dashboard — ZiBuy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ============ TOP BAR ============ -->
<header class="topbar">
  <a href="index.html"><h1 class="logo">Zi<span>Buy</span></h1></a>
  <div class="topbar-actions" style="margin-left:auto">
    <button class="btn btn-dark" onclick="window.location.href='index.html'">← Home</button>
  </div>
</header>

<!-- ============ DASHBOARD ============ -->
<div class="dashboard-wrap">

  <!-- Sidebar -->
  <aside class="dashboard-sidebar">
    <div class="user-profile-card">
      <div class="user-avatar">👤</div>
      <h3 id="user-email">User</h3>
      <p class="user-email" id="user-email-display">Loading...</p>
    </div>

    <nav class="dashboard-nav">
      <button class="nav-item active" onclick="switchTab('my-ads')">
        <span>📦</span>
        <span>My Ads</span>
      </button>
      <button class="nav-item" onclick="switchTab('orders')">
        <span>🛒</span>
        <span>My Orders</span>
      </button>
      <button class="nav-item" onclick="switchTab('profile')">
        <span>⚙️</span>
        <span>Settings</span>
      </button>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="dashboard-content">

    <!-- MY ADS TAB -->
    <div class="dashboard-tab active" id="my-ads-tab">
      <div class="tab-header">
        <h2>📦 My Products</h2>
        <a href="post-ad.html" class="btn btn-orange">+ Post New Ad</a>
      </div>
      <div id="my-ads-list" class="ads-list">
        <p style="text-align:center;padding:40px">Loading your products...</p>
      </div>
    </div>

    <!-- ORDERS TAB -->
    <div class="dashboard-tab" id="orders-tab">
      <div class="tab-header">
        <h2>🛒 My Orders</h2>
      </div>
      <div id="orders-list" class="orders-list">
        <p style="text-align:center;padding:40px">Loading your orders...</p>
      </div>
    </div>

    <!-- PROFILE TAB -->
    <div class="dashboard-tab" id="profile-tab">
      <div class="tab-header">
        <h2>⚙️ Account Settings</h2>
      </div>
      <div id="profile-settings">
        <p style="text-align:center;padding:40px">Loading settings...</p>
      </div>
    </div>

  </main>

</div>

<!-- ============ MODALS ============ -->
<div id="overlay" class="overlay" onclick="closeModal()"></div>
<div id="toast-container" class="toast-container"></div>

<script type="module">
  // Set user email display
  import { auth } from "./firebase.js";
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById("user-email").textContent = user.email.split("@")[0];
      document.getElementById("user-email-display").textContent = user.email;
    }
  });
</script>

<script type="module" src="dashboard.js"></script>

</body>
</html>
