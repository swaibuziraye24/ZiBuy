<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Edit Business Profile</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="/manifest.json">

<style>

body{
  background:#f3f4f6;
  font-family:Arial,sans-serif;
  padding:20px;
}

.edit-shop-container{
  max-width:700px;
  margin:auto;
  background:white;
  padding:24px;
  border-radius:18px;
  box-shadow:0 4px 20px rgba(0,0,0,.08);
}

.edit-shop-container h1{
  margin-bottom:20px;
  font-size:28px;
}

.form-group{
  margin-bottom:20px;
}

.form-group label{
  display:block;
  margin-bottom:8px;
  font-weight:700;
}

.form-group input,
.form-group textarea{
  width:100%;
  padding:14px;
  border:1.5px solid #ddd;
  border-radius:12px;
  font-size:15px;
}

.form-group textarea{
  resize:vertical;
  min-height:120px;
}

.preview-image{
  width:100%;
  margin-top:10px;
  border-radius:14px;
  object-fit:cover;
  background:#eee;
}

#logo-preview{
  height:120px;
  max-width:120px;
}

#banner-preview{
  height:220px;
}

.save-btn{
  background:#ff6600;
  color:white;
  border:none;
  padding:16px;
  width:100%;
  border-radius:14px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}

.save-btn:hover{
  opacity:.92;
}

.back-btn{
  display:inline-block;
  margin-bottom:20px;
  text-decoration:none;
  color:#ff6600;
  font-weight:700;
}

</style>
</head>
<body>

<div class="edit-shop-container">

<a
href="shop.html"
class="back-btn">
← Back to Shop
</a>

<h1>🏪 Edit Business Profile</h1>

<div class="form-group">

<label>
Business Name
</label>

<input
type="text"
id="business-name"
placeholder="Enter business name">

</div>

<div class="form-group">

<label>
Business Description
</label>

<textarea
id="business-description"
placeholder="Describe your business">
</textarea>

</div>

<div class="form-group">

<label>
Business Logo
</label>

<input
type="file"
id="logo-input"
accept="image/*">

<img
id="logo-preview"
class="preview-image"
src=""
alt="Logo Preview">

</div>

<div class="form-group">

<label>
Business Banner
</label>

<input
type="file"
id="banner-input"
accept="image/*">

<img
id="banner-preview"
class="preview-image"
src=""
alt="Banner Preview">

</div>

<button
id="save-btn"
class="save-btn"
onclick="saveShopProfile()">

Save Business Profile

</button>

</div>


<script src="nav.js"></script>

<script
type="module"
src="edit-shop.js">
</script>

</body>
</html>
