<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ff6600">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

  <title id="seo-title">ZiBuy — Product</title>


<meta id="seo-description"
      name="description"
      content="Buy and sell safely on ZiBuy Uganda">

<meta id="og-title"
      property="og:title"
      content="ZiBuy Product">

<meta id="og-description"
      property="og:description"
      content="Buy and sell safely on ZiBuy Uganda">

<meta id="og-image"
      property="og:image"
      content="">

<meta id="og-url"
      property="og:url"
      content="">

<meta property="og:type"
      content="product">

<meta name="twitter:card"
      content="summary_large_image">

<meta id="twitter-title"
      name="twitter:title"
      content="ZiBuy Product">

<meta id="twitter-description"
      name="twitter:description"
      content="Buy and sell safely on ZiBuy Uganda">

<meta id="twitter-image"
      name="twitter:image"
      content="">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="canonical" id="canonical-url" href="">

  <script id="product-schema" type="application/ld+json"></script>
  
</head>
<body>

<!-- ============ TOP BAR ============ -->
<header class="topbar">
  <a href="index.html"><h1 class="logo">Zi<span>Buy</span></h1></a>
  <div class="topbar-actions" style="margin-left:auto">
    <div class="cart-btn-wrap">
      <button class="btn btn-orange" onclick="toggleCart()">🛒 Cart</button>
      <span class="cart-badge" id="cart-count">0</span>
    </div>
  </div>
</header>

<!-- ============ PRODUCT PAGE ============ -->
<div class="product-page-wrap">

  <a href="javascript:void(0)" class="back-link" onclick="goBackToHome()">← Back to listings</a>

  <div class="product-page-grid" id="product-page-grid">

    <!-- Skeleton while loading -->
    <div>
      <div class="skeleton-img" style="height:380px;border-radius:14px"></div>
    </div>
    <div>
      <div class="skeleton-body">
        <div class="skeleton-line short"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line short"></div>
        <div class="skeleton-line" style="height:40px;margin-top:20px"></div>
      </div>
    </div>

  </div>

</div>

<!-- ============ CART SIDEBAR ============ -->
<div id="cart-sidebar" class="cart-sidebar">
  <div class="cart-top">
    <h2>🛒 Your Cart</h2>
    <button class="close-cart" onclick="closeCart()">×</button>
  </div>
  <div id="cart-items"></div>
  <div class="cart-footer">
    <input type="text" id="customer-name"     placeholder="Your Full Name">
    <input type="tel"  id="customer-phone"    placeholder="Phone Number">
    <input type="text" id="customer-location" placeholder="Delivery Location">
    <div class="cart-total-row">
      Total: <span>UGX <span id="cart-total">0</span></span>
    </div>
    <button class="checkout-btn" onclick="checkout()">Place Order</button>
  </div>
</div>

<div id="overlay" class="overlay" onclick="closeCart()"></div>
<div id="toast-container" class="toast-container"></div>

<!-- ============ REVIEWS SECTION ============ -->
<div class="product-page-wrap" style="margin-top:0">
  <div style="background:white;border-radius:20px;padding:28px;box-shadow:0 4px 20px rgba(0,0,0,0.08)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <h2 style="font-size:20px;font-weight:800;margin:0">⭐ Customer Reviews</h2>
      <span id="avg-rating-badge" style="background:#fff4ee;color:#ff6600;font-weight:800;font-size:14px;padding:6px 14px;border-radius:20px"></span>
    </div>

    <div id="product-reviews" style="margin-bottom:24px"></div>

    <div style="background:#f9fafb;border-radius:14px;padding:20px">
      <h3 style="font-size:15px;font-weight:800;margin-bottom:14px">✍️ Write a Review</h3>
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap">
        <label style="flex:1;min-width:120px;display:flex;align-items:center;gap:8px;background:white;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 14px;cursor:pointer;font-size:14px;font-weight:700">
          <input type="radio" name="star" value="5" checked style="accent-color:#ff6600"> ⭐⭐⭐⭐⭐
        </label>
        <label style="flex:1;min-width:120px;display:flex;align-items:center;gap:8px;background:white;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 14px;cursor:pointer;font-size:14px;font-weight:700">
          <input type="radio" name="star" value="4" style="accent-color:#ff6600"> ⭐⭐⭐⭐
        </label>
        <label style="flex:1;min-width:120px;display:flex;align-items:center;gap:8px;background:white;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 14px;cursor:pointer;font-size:14px;font-weight:700">
          <input type="radio" name="star" value="3" style="accent-color:#ff6600"> ⭐⭐⭐
        </label>
        <label style="flex:1;min-width:120px;display:flex;align-items:center;gap:8px;background:white;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 14px;cursor:pointer;font-size:14px;font-weight:700">
          <input type="radio" name="star" value="2" style="accent-color:#ff6600"> ⭐⭐
        </label>
        <label style="flex:1;min-width:120px;display:flex;align-items:center;gap:8px;background:white;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px 14px;cursor:pointer;font-size:14px;font-weight:700">
          <input type="radio" name="star" value="1" style="accent-color:#ff6600"> ⭐
        </label>
      </div>
      <textarea id="review-text" placeholder="Share your experience with this product..." rows="3" style="width:100%;padding:12px;border:1.5px solid #e5e7eb;border-radius:10px;font-family:inherit;margin-bottom:10px;resize:none;box-sizing:border-box;font-size:14px"></textarea>
      <button onclick="submitProductReview()" style="background:#ff6600;color:white;border:none;padding:13px;border-radius:10px;font-weight:800;cursor:pointer;width:100%;font-size:15px;font-family:inherit">Post Review</button>
    </div>
  </div>
</div>

<!-- Related products insertion anchor -->
<div id="related-products-anchor"></div>

<script type="module" src="error-logger.js"></script>

<script type="module" src="product.js"></script>
<script type="module" src="notifications-setup.js"></script>
<script type="module" src="nav.js"></script>


<script>
  // Don't force reload on back/forward navigation — let browser bfcache work
  window.addEventListener("pageshow", (event) => {
    if (event.persisted) {
      // Page restored from bfcache — just refresh dynamic bits, don't reload everything
      if (typeof window.renderProducts === "function" && window.allProducts?.length) {
        window.renderProducts();
      }
    }
  });
</script>
</body>
</html>
