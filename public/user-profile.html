<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ff6600">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

  <title>Seller Profile — ZiBuy</title>
  <link rel="stylesheet" href="style.css">
<link rel="manifest" href="/manifest.json">
</head>
<body>

<header class="topbar">
  <a href="index.html"><h1 class="logo">Zi<span>Buy</span></h1></a>
  <div style="margin-left:auto">
    <button class="btn btn-dark" onclick="window.history.back()">← Back</button>
  </div>
</header>

<div class="user-profile-wrap">
  <!-- Profile Header -->
  <div class="profile-header">
    <div class="profile-avatar" id="profile-avatar">👤</div>
    <div class="profile-info">
      <h1 id="profile-name">Seller Name</h1>
      <p id="profile-location">📍 Location</p>
      <div class="profile-rating">
        <span id="profile-rating">⭐ 0 (0 reviews)</span>
        <span id="profile-verified" style="display:none;background:#10b981;color:white;padding:4px 8px;border-radius:6px;font-size:12px;font-weight:700">✅ Verified Seller</span>
        <span id="profile-plan-badge" style="display:none;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:800"></span>
        <span id="phone-verified-badge" class="phone-verified-badge" style="display:none;background:#3b82f6;color:white;padding:4px 8px;border-radius:6px;font-size:12px;font-weight:700">📱 Phone Verified</span>
        <button id="verify-phone-btn" onclick="openPhoneVerifyModal(window.sellerPhone||'')"
          style="display:none;background:#fff4ee;color:#ff6600;border:1.5px solid #ff6600;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">
          Verify Phone
        </button>
      </div>
    </div>
    
  <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button onclick="messageProfile()" class="btn btn-orange" style="padding:12px 24px;white-space:nowrap">💬 Send Message</button>
<button onclick="reportThisSeller()" class="btn" style="padding:12px 20px;white-space:nowrap;background:#fee2e2;color:#ef4444;border:none">🚩 Report</button>
      <button id="edit-profile-btn" onclick="openEditProfile()" style="display:none;background:#f3f4f6;color:#111827;border:none;padding:12px 24px;border-radius:10px;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit;white-space:nowrap">
        ✏️ Edit Profile
      </button>
    </div>
  </div>

  <!-- Profile Stats -->
  <div class="profile-stats">
    <div class="stat-box">
      <p class="stat-label">Products</p>
      <p class="stat-value" id="stat-products">0</p>
    </div>
    <div class="stat-box">
      <p class="stat-label">Reviews</p>
      <p class="stat-value" id="stat-reviews">0</p>
    </div>
    <div class="stat-box">
      <p class="stat-label">Rating</p>
      <p class="stat-value" id="stat-rating">0.0</p>
    </div>
    <div class="stat-box">
      <p class="stat-label">Member Since</p>
      <p class="stat-value" id="stat-joined" style="font-size:13px">—</p>
    </div>
  </div>

  <!-- Bio -->
  <div class="profile-section">
    <h2>About</h2>
    <p id="profile-bio" style="color:#6b7280;line-height:1.6">No bio yet</p>
  </div>

  <!-- Contact Info -->
  <div class="profile-section">
    <h2>Contact</h2>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button onclick="contactWhatsApp()" class="contact-btn" style="background:#25d366;color:white">
        📱 WhatsApp
      </button>
      <button onclick="contactPhone()" class="contact-btn" style="background:#111827;color:white">
        ☎️ Call
      </button>
    </div>
  </div>

  <!-- Products -->
  <div class="profile-section">
    <h2>Products (<span id="product-count">0</span>)</h2>
    <div id="seller-products" class="products"></div>
  </div>

  <!-- Reviews -->
  <div class="profile-section">
    <h2>Recent Reviews</h2>
    <div id="seller-reviews" style="display:flex;flex-direction:column;gap:12px"></div>
  </div>
</div>

<div id="overlay" class="overlay" onclick="closeEditProfile()"></div>
<div id="toast-container" class="toast-container"></div>

<!-- ============ EDIT PROFILE MODAL ============ -->
<div id="edit-profile-modal"
  style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;justify-content:center;align-items:center;padding:16px;overflow-y:auto">
  <div style="background:white;border-radius:20px;padding:28px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease">

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h2 style="margin:0;font-size:20px;font-weight:800">✏️ Edit My Profile</h2>
      <button onclick="closeEditProfile()"
        style="background:#f3f4f6;border:none;width:36px;height:36px;border-radius:50%;font-size:20px;cursor:pointer">×</button>
    </div>

    <!-- Display Name -->
    <label style="font-size:12px;font-weight:800;text-transform:uppercase;color:#6b7280;letter-spacing:.5px;display:block;margin-bottom:6px">
      Display Name
    </label>
    <input type="text" id="ep-name" placeholder="Your name or business name"
      style="width:100%;padding:12px;border:1.5px solid #e5e7eb;border-radius:10px;font-family:inherit;font-size:14px;margin-bottom:14px;box-sizing:border-box;outline:none">

    <!-- Phone -->
    <label style="font-size:12px;font-weight:800;text-transform:uppercase;color:#6b7280;letter-spacing:.5px;display:block;margin-bottom:6px">
      Phone / WhatsApp Number
    </label>
    <input type="tel" id="ep-phone" placeholder="256701234567"
      style="width:100%;padding:12px;border:1.5px solid #e5e7eb;border-radius:10px;font-family:inherit;font-size:14px;margin-bottom:14px;box-sizing:border-box;outline:none">

    <!-- Location -->
    <label style="font-size:12px;font-weight:800;text-transform:uppercase;color:#6b7280;letter-spacing:.5px;display:block;margin-bottom:6px">
      Location
    </label>
    <select id="ep-location"
      style="width:100%;padding:12px;border:1.5px solid #e5e7eb;border-radius:10px;font-family:inherit;font-size:14px;margin-bottom:14px;box-sizing:border-box;outline:none;background:white">
      <option value="">Select location</option>
      <option>Kampala</option><option>Wakiso</option><option>Mukono</option>
      <option>Jinja</option><option>Mbarara</option><option>Entebbe</option>
      <option>Gulu</option><option>Mbale</option><option>Masaka</option>
      <option>Fort Portal</option><option>Hoima</option><option>Arua</option>
      <option>Masindi</option><option>Bushenyi</option><option>Other</option>
    </select>

    <!-- Bio -->
    <label style="font-size:12px;font-weight:800;text-transform:uppercase;color:#6b7280;letter-spacing:.5px;display:block;margin-bottom:6px">
      Bio / About
    </label>
    <textarea id="ep-bio" rows="4" placeholder="Tell buyers about yourself or your business..."
      style="width:100%;padding:12px;border:1.5px solid #e5e7eb;border-radius:10px;font-family:inherit;font-size:14px;margin-bottom:20px;box-sizing:border-box;outline:none;resize:none"></textarea>

    <div style="display:flex;gap:10px">
      <button onclick="closeEditProfile()"
        style="flex:1;padding:14px;border:1.5px solid #e5e7eb;border-radius:10px;background:white;font-family:inherit;font-weight:700;cursor:pointer">
        Cancel
      </button>
      <button id="ep-save-btn" onclick="saveProfile()"
        style="flex:2;padding:14px;border:none;border-radius:10px;background:#ff6600;color:white;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer">
        💾 Save Changes
      </button>
    </div>

  </div>
</div>

<script type="module" src="notifications-setup.js"></script>

<script type="module" src="user-profile.js"></script>
<script type="module" src="phone-verify.js"></script>

<script src="nav.js"></script>


<script>
  // Don't force reload on back/forward navigation — let browser bfcache work
  window.addEventListener("pageshow", (event) => {
    if (event.persisted) {
      // Page restored from bfcache — just refresh dynamic bits, don't reload everything
      if (typeof window.renderProducts === "function" && window.allProducts?.length) {
        window.renderProducts();
      }
    }
  });
</script>
</body>
</html>
