<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ff6600">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
  <title>Messages — ZiBuy</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="/manifest.json">
</head>
<body>

<header class="topbar">
  <a href="index.html"><img src="my_logo.png" alt="ZiBuy" id="secret-admin-trigger" style="height:45px;width:auto;cursor:pointer"></a>
  <div class="topbar-actions" style="margin-left:auto">
    <button class="btn btn-dark" onclick="window.location.href='dashboard.html'">← Back</button>
  </div>
</header>

<div class="messages-wrap">
  <aside class="messages-sidebar">
    <h3 style="margin-bottom:14px;font-weight:800">💬 Conversations</h3>
    <div id="conversations-list" style="display:flex;flex-direction:column;gap:6px"></div>
  </aside>

  <main class="messages-main">
    <!-- Empty state -->
    <div id="chat-empty" style="text-align:center;padding:60px 20px;color:#6b7280">
      <p style="font-size:32px;margin-bottom:12px">💬</p>
      <p>Select a conversation or start messaging</p>
    </div>

    <!-- Chat window -->
    <div id="chat-window" style="display:none;height:100%;flex-direction:column;width:100%">
      <!-- Header -->
      <div class="chat-header">
        <button onclick="closeChat()"
          style="background:none;border:none;font-size:20px;cursor:pointer;padding:0;margin-right:8px;color:#6b7280;display:none"
          id="chat-back-btn">←</button>
        <h3 id="chat-with-name" style="margin:0;flex:1">Chat</h3>
        <button class="btn btn-outline" onclick="closeChat()" style="padding:6px 12px;font-size:12px">Close</button>
      </div>
      <style>
       @media(max-width:768px){
  #chat-back-btn { display:inline-block !important; }
  .messages-wrap { 
    grid-template-columns: 1fr !important;
    height: calc(100vh - 120px);
  }
  .messages-sidebar { 
    display:flex !important;
    flex-direction:column;
    height:100%;
  }
  .messages-main { 
    display:none;
    height:100%;
  }
  .messages-main.chat-open {
    display:flex !important;
    flex-direction:column;
  }
  .messages-sidebar.chat-open {
    display:none !important;
  }
}
      </style>

      <!-- Messages -->
      <div id="messages-container" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px"></div>

      <!-- Input -->
      <div class="chat-input-area">
        <input type="text" id="message-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); }">
        <button class="send-btn" onclick="sendMessage()" title="Send">✈️</button>
      </div>
    </div>
  </main>
</div>

<div id="overlay" class="overlay" onclick="closeChat()"></div>
<div id="toast-container" class="toast-container"></div>

<script src="nav.js"></script>
<script type="module" src="notifications-setup.js"></script>
<script type="module" src="messages.js"></script>


<script>
  // Don't force reload on back/forward navigation — let browser bfcache work
  window.addEventListener("pageshow", (event) => {
    if (event.persisted) {
      // Page restored from bfcache — just refresh dynamic bits, don't reload everything
      if (typeof window.renderProducts === "function" && window.allProducts?.length) {
        window.renderProducts();
      }
    }
  });
</script>

</body>
</html>
