<!-- =========================================
ZI BUY - SEARCH BAR
========================================= -->
<div class="search-wrap">
  <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
    <circle cx="11" cy="11" r="8"></circle>
    <path d="m21 21-4.35-4.35"></path>
  </svg>

  <input
    type="text"
    id="search-input"
    placeholder="Search products..."
    onkeyup="searchProducts()"
  >

  <div id="search-suggestions" class="search-suggestions"></div>
</div>


<!-- =========================================
FILTER PANEL
========================================= -->
<div id="filters-panel" class="filters-panel">

  <div class="filters-container">

    <!-- PRICE -->
    <div class="filter-group">
      <h3>💰 Price Range</h3>

      <div class="price-inputs">
        <input type="number" id="price-min" value="0" placeholder="Min UGX">
        <span>—</span>
        <input type="number" id="price-max" value="100000000" placeholder="Max UGX">
      </div>
    </div>

    <!-- LOCATION -->
    <div class="filter-group">
      <h3>📍 Location</h3>

      <!-- FIX: id must match JS -->
      <select id="filter-location">
        <option value="">All Uganda</option>
        <option value="Kampala">Kampala</option>
        <option value="Wakiso">Wakiso</option>
        <option value="Mukono">Mukono</option>
        <option value="Jinja">Jinja</option>
        <option value="Mbarara">Mbarara</option>
        <option value="Entebbe">Entebbe</option>
        <option value="Gulu">Gulu</option>
        <option value="Mbale">Mbale</option>
        <option value="Masaka">Masaka</option>
        <option value="Fort Portal">Fort Portal</option>
      </select>
    </div>

    <!-- SORT -->
    <div class="filter-group">
      <h3>🔄 Sort By</h3>

      <!-- FIX: id must match JS -->
      <select id="filter-sort">
        <option value="newest">Newest First</option>
        <option value="price-low">Price: Low to High</option>
        <option value="price-high">Price: High to Low</option>
        <option value="views">Most Viewed</option>
      </select>
    </div>

    <!-- BUTTONS -->
    <div class="filter-actions">

      <button class="btn btn-outline" onclick="resetFilters()">
        Reset Filters
      </button>

      <button class="btn btn-orange" onclick="applyFilters()">
        Apply Filters
      </button>

    </div>

  </div>
</div>


<!-- =========================================
CATEGORIES
========================================= -->
<nav class="categories">

  <button class="cat-btn active" onclick="filterCategory('all')">🏪 All</button>
  <button class="cat-btn" onclick="filterCategory('phones')">📱 Phones</button>
  <button class="cat-btn" onclick="filterCategory('electronics')">💻 Electronics</button>
  <button class="cat-btn" onclick="filterCategory('fashion')">👗 Fashion</button>
  <button class="cat-btn" onclick="filterCategory('shoes')">👟 Shoes</button>
  <button class="cat-btn" onclick="filterCategory('beauty')">💄 Beauty</button>
  <button class="cat-btn" onclick="filterCategory('bags')">👜 Bags</button>
  <button class="cat-btn" onclick="filterCategory('groceries')">🛒 Groceries</button>
  <button class="cat-btn" onclick="filterCategory('watches')">⌚ Watches</button>
  <button class="cat-btn" onclick="filterCategory('computers')">🖥️ Computers</button>
  <button class="cat-btn" onclick="filterCategory('gaming')">🎮 Gaming</button>
  <button class="cat-btn" onclick="filterCategory('home')">🏠 Home</button>
  <button class="cat-btn" onclick="filterCategory('accessories')">💎 Accessories</button>

  <button class="cat-btn filter-toggle-btn" onclick="toggleFilters()" style="margin-left:auto">
    🔽 Filters
  </button>

</nav>


<!-- =========================================
PRODUCT LIST
========================================= -->
<div id="products" class="products"></div>
