<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZiBuy Marketplace</title>

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- ================= TOPBAR ================= -->
<header class="topbar">

  <!-- LOGO (ADMIN SECRET CLICK TRIGGER) -->
  <div class="logo" id="logo">
    <h2>ZiBuy</h2>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="Search products, shops, services...">
    <div class="search-suggestions" id="search-suggestions"></div>
  </div>

  <!-- TOP ACTIONS -->
  <div class="topbar-actions">

    <button class="btn btn-outline" id="shops-btn">Shops</button>

    <button class="btn btn-dark" id="chat-btn">
      <i class="fas fa-comments"></i>
    </button>

    <button class="btn btn-orange" id="account-btn">
      Account
    </button>

    <button class="btn btn-dark" id="cart-btn">
      <i class="fas fa-shopping-cart"></i>
      <span class="cart-badge" id="cart-count">0</span>
    </button>

  </div>
</header>

<!-- ================= LOCATION BAR ================= -->
<section class="category-filters">

  <select id="location-select">
    <option value="">All Uganda</option>

    <optgroup label="Central Region">
      <option>Kampala</option>
      <option>Wakiso</option>
      <option>Mukono</option>
      <option>Mityana</option>
      <option>Luwero</option>
      <option>Mpigi</option>
      <option>Kayunga</option>
    </optgroup>

    <optgroup label="Western Region">
      <option>Mbarara</option>
      <option>Kasese</option>
      <option>Ntungamo</option>
      <option>Ibanda</option>
      <option>Hoima</option>
      <option>Masindi</option>
      <option>Bushenyi</option>
    </optgroup>

    <optgroup label="Eastern Region">
      <option>Jinja</option>
      <option>Mbale</option>
      <option>Iganga</option>
      <option>Tororo</option>
      <option>Soroti</option>
      <option>Busia</option>
    </optgroup>

    <optgroup label="Northern Region">
      <option>Gulu</option>
      <option>Lira</option>
      <option>Arua</option>
      <option>Kitgum</option>
      <option>Pader</option>
    </optgroup>

  </select>

  <button>All</button>
  <button>Electronics</button>
  <button>Fashion</button>
  <button>Vehicles</button>
  <button>Services</button>

</section>

<!-- ================= MAIN MARKETPLACE ================= -->
<main>

  <!-- ADS / PRODUCTS -->
  <section id="ads-container"></section>

  <!-- ================= SHOPS PAGE ================= -->
  <section id="shops-page" style="display:none;">

    <h2>Shops</h2>

    <div class="search-box">
      <input type="text" id="shop-search" placeholder="Search shops...">
    </div>

    <div id="shops-container"></div>
  </section>

  <!-- ================= CHAT SYSTEM ================= -->
  <section id="chat-panel" style="display:none;">

    <h2>Messages</h2>

    <div id="chat-list"></div>

    <div id="chat-box">
      <div id="chat-messages"></div>

      <div class="chat-input">
        <input type="text" id="chat-text" placeholder="Type message...">
        <button id="send-chat">Send</button>
      </div>
    </div>

  </section>

  <!-- ================= CUSTOMER ACCOUNT ================= -->
  <section id="account-panel" style="display:none;">

    <h2>My Account</h2>

    <div id="user-info"></div>

    <button class="btn btn-dark" id="logout-btn">Logout</button>

  </section>

  <!-- ================= ADMIN PANEL (HIDDEN) ================= -->
  <section id="admin-panel" class="admin-verification-wrap" style="display:none;">

    <h1>Admin Panel</h1>

    <div class="verification-filters">
      <button class="verify-filter active">All</button>
      <button class="verify-filter">Pending</button>
      <button class="verify-filter">Approved</button>
      <button class="verify-filter">Rejected</button>
    </div>

    <div id="verification-list"></div>

  </section>

</main>

<!-- ================= LOGIN MODAL ================= -->
<div id="login-modal" class="modal" style="display:none;">
  <div class="modal-box">

    <h2>Login</h2>

    <input type="email" id="login-email" placeholder="Email">
    <input type="password" id="login-password" placeholder="Password">

    <button class="btn btn-orange" id="login-btn">Login</button>

    <button class="btn btn-dark" onclick="closeLogin()">Close</button>

  </div>
</div>

<!-- ================= CHAT FLOAT BUTTON ================= -->
<button id="open-chat-float" class="btn btn-orange" style="position:fixed;bottom:20px;right:20px;">
  Chat
</button>

<!-- ================= FOOTER ================= -->
<footer class="footer">
  <a href="#">About</a>
  <a href="#">Help</a>
  <a href="#">Terms</a>
  <a href="#">Privacy</a>
</footer>

<!-- ================= ADMIN SECRET CLICK SCRIPT ================= -->
<script>
let logoClicks = 0;

document.getElementById("logo").addEventListener("click", () => {
  logoClicks++;

  if (logoClicks >= 5) {
    document.getElementById("admin-panel").style.display = "block";
    alert("Admin mode unlocked");
  }

  setTimeout(() => logoClicks = 0, 2000);
});
</script>

<!-- ================= SCRIPTS ================= -->
<script type="module" src="firebase.js"></script>
<script type="module" src="auth.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
