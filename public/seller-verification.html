<body>

<header class="topbar">
  <a href="index.html">
    <h1 class="logo">Zi<span>Buy</span></h1>
  </a>

  <button
    class="btn btn-dark mobile-home-btn"
    onclick="window.location.href='index.html'"
  >
    ← Home
  </button>
</header>

<div class="verify-page">

  <div class="verify-card">

    <div class="verify-header">

      <div class="verify-icon">
        ✅
      </div>

      <h1>Seller Verification</h1>

      <p>
        Become a trusted seller on ZiBuy and increase customer confidence.
      </p>

    </div>

    <div class="verify-benefits">

      <div class="benefit-card">
        <span>🛡️</span>
        <p>Trusted Seller Badge</p>
      </div>

      <div class="benefit-card">
        <span>📈</span>
        <p>More Visibility</p>
      </div>

      <div class="benefit-card">
        <span>⭐</span>
        <p>Increase Sales</p>
      </div>

    </div>

    <div class="verify-form">

      <div class="form-group">
        <label>Full Name</label>
        <input
          type="text"
          id="verify-name"
          placeholder="Enter your full name"
        >
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input
          type="tel"
          id="verify-phone"
          placeholder="256701234567"
        >
      </div>

      <div class="form-group">
        <label>Location</label>
        <input
          type="text"
          id="verify-location"
          placeholder="Kampala, Uganda"
        >
      </div>

      <div class="form-group">
        <label>National ID Number</label>
        <input
          type="text"
          id="verify-national-id"
          placeholder="CM123456789..."
        >
      </div>

      <div class="form-group">
        <label>About You</label>
        <textarea
          id="verify-about"
          rows="5"
          placeholder="Tell buyers about yourself and your business..."
        ></textarea>
      </div>

      <button
        class="submit-verify-btn"
        onclick="submitVerification()"
      >
        Submit Verification
      </button>

      <div id="verification-status"></div>

    </div>

  </div>

</div>

<div id="toast-container" class="toast-container"></div>

<script type="module" src="seller-verification.js"></script>

</body>
