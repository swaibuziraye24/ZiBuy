<div class="verification-page">

  <div class="verification-card">

    <h1>✅ Seller Verification</h1>

    <p class="verify-subtitle">
      Get verified on ZiBuy to build trust and sell faster.
    </p>

    <div class="verify-benefits">

      <div class="benefit">
        🛡️ Trusted seller badge
      </div>

      <div class="benefit">
        📈 More customer trust
      </div>

      <div class="benefit">
        ⭐ Better visibility
      </div>

    </div>

    <input
      type="text"
      id="verify-name"
      placeholder="Full Name"
    >

    <input
      type="tel"
      id="verify-phone"
      placeholder="Phone Number"
    >

    <input
      type="text"
      id="verify-location"
      placeholder="Location"
    >

    <input
      type="text"
      id="verify-national-id"
      placeholder="National ID Number"
    >

    <textarea
      id="verify-about"
      placeholder="Tell customers about yourself"
      rows="4"
    ></textarea>

    <button
      class="btn btn-orange"
      onclick="submitVerification()"
    >
      Submit Verification
    </button>

    <div id="verification-status"></div>

  </div>

</div>
