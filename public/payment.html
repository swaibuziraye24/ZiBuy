<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ff6600">
<meta name="apple-mobile-web-app-capable" content="yes">

  <title>Checkout — ZiBuy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
<a href="index.html"><img src="my_logo.png" alt="ZiBuy" id="secret-admin-trigger" style="height:45px;width:auto;cursor:pointer"></a>
</header>

<div class="checkout-wrap">
  <div class="checkout-container">
    <h1>🛒 Checkout</h1>

    <div class="checkout-grid">
      <!-- Order Summary -->
      <div class="order-summary">
        <h2>Order Summary</h2>
        <div id="order-items"></div>
        <div class="summary-line">
          <span>Subtotal:</span>
          <span id="subtotal">UGX 0</span>
        </div>
        <div class="summary-line">
          <span>Delivery:</span>
          <span id="delivery">UGX 0</span>
        </div>
        <div class="summary-line" style="border-top:2px solid #e5e7eb;padding-top:12px;font-weight:800;font-size:18px">
          <span>Total:</span>
          <span id="total-price" style="color:#ff6600">UGX 0</span>
        </div>
      </div>

      <!-- Payment Form -->
      <div class="payment-form">
        <h2>Delivery & Payment</h2>

        <div class="form-section">
          <h3>Delivery Address</h3>
          <input type="text" id="delivery-name" placeholder="Full Name" required>
          <input type="tel" id="delivery-phone" placeholder="Phone Number" required>
          <input type="text" id="delivery-address" placeholder="Street Address" required>
          <select id="delivery-location" required>
            <option value="">Select Location</option>
            <option value="Kampala">Kampala</option>
            <option value="Wakiso">Wakiso</option>
            <option value="Mukono">Mukono</option>
            <option value="Jinja">Jinja</option>
            <option value="Mbarara">Mbarara</option>
            <option value="Entebbe">Entebbe</option>
          </select>
        </div>

        <div class="form-section">
          <h3>Payment Method</h3>
          <label class="payment-option">
            <input type="radio" name="payment" value="cod" checked>
            💵 Cash on Delivery
          </label>
          <label class="payment-option">
            <input type="radio" name="payment" value="mobile">
            📱 Mobile Money (MTN/Airtel)
          </label>
          <label class="payment-option">
            <input type="radio" name="payment" value="card">
            💳 Debit/Credit Card
          </label>
        </div>

        <div id="payment-details"></div>

        <button onclick="placeOrder()" class="checkout-btn" style="width:100%;padding:16px;font-size:16px;margin-top:20px">
          Place Order
        </button>
      </div>
    </div>
  </div>
</div>

<div id="overlay" class="overlay"></div>
<div id="toast-container" class="toast-container"></div>


<script type="module" src="payment.js"></script>
</body>
</html>
