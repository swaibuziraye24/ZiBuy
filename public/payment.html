<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ff6600">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

  <title>Checkout — ZiBuy</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="/manifest.json">
</head>
<body>

<header class="topbar">
<a href="index.html"><img src="my_logo.png" alt="ZiBuy" id="secret-admin-trigger" style="height:45px;width:auto;cursor:pointer"></a>
</header>

<div class="checkout-wrap">
  <div class="checkout-container">
    <h1>🛒 Checkout</h1>

    <div class="checkout-grid">
      <!-- Order Summary -->
      <div class="order-summary">
        <h2>Order Summary</h2>

<div class="summary-line">
  <span>ZiBuy Fee (3%):</span>
  <span id="platform-fee">UGX 0</span>
</div>

        <div id="order-items"></div>
        <div class="summary-line">
          <span>Subtotal:</span>
          <span id="subtotal">UGX 0</span>
        </div>
        <div class="summary-line">
          <span>Delivery:</span>
          <span id="delivery">UGX 0</span>
        </div>
        <div class="summary-line" style="border-top:2px solid #e5e7eb;padding-top:12px;font-weight:800;font-size:18px">
          <span>Total:</span>
          <span id="total-price" style="color:#ff6600">UGX 0</span>
        </div>
      </div>

      <!-- Payment Form -->
      <div class="payment-form">
        <h2>Delivery & Payment</h2>

        <div class="form-section">
          <h3>Delivery Address</h3>
          <input type="text" id="delivery-name" placeholder="Full Name" required>
          <input type="tel" id="delivery-phone" placeholder="Phone Number" required>
          <input type="text" id="delivery-address" placeholder="Street Address" required>
          <select id="delivery-district" required
            onchange="updateSubLocations('delivery-district','delivery-sublocation')"
            style="width:100%;padding:12px;margin-bottom:10px;border:1.5px solid #e5e7eb;
            border-radius:10px;font-family:inherit;font-size:14px;outline:none">
            <option value="">Select District / City</option>
          </select>
          <div id="delivery-sublocation-wrap" style="display:none">
            <select id="delivery-sublocation"
              style="width:100%;padding:12px;border:1.5px solid #e5e7eb;
              border-radius:10px;font-family:inherit;font-size:14px;outline:none">
              <option value="">Select Town / Village / Area</option>
            </select>
          </div>

        <div class="form-section">
          <h3>Payment Method</h3>
          <div style="background:#e7f9ef;border:1px solid #86efac;padding:16px;border-radius:12px;display:flex;align-items:center;gap:12px">
            <span style="font-size:28px">💬</span>
            <div>
              <p style="margin:0;font-weight:800;color:#166534">Pay via WhatsApp</p>
              <p style="margin:4px 0 0;font-size:13px;color:#15803d">MTN / Airtel Money · confirmed by our team</p>
            </div>
          </div>
        </div>

        <div id="payment-details"></div>

        <button onclick="placeOrder()" class="checkout-btn" style="width:100%;padding:16px;font-size:16px;margin-top:20px">
          Place Order
        </button>
      </div>
    </div>
  </div>
</div>

<div id="overlay" class="overlay"></div>
<div id="toast-container" class="toast-container"></div>

<script type="module" src="notifications-setup.js"></script>

<script src="nav.js"></script>

<script type="module" src="payment.js"></script>
</body>
</html>
