<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ff6600">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

  <title>Checkout — ZiBuy</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="/manifest.json">

<style>
  .loc-search-wrap { position:relative; }
.loc-search-input {
  width:100%;padding:13px 14px;border:1.5px solid #e5e7eb;border-radius:12px;
  font-size:15px;font-family:inherit;outline:none;background:white;box-sizing:border-box;
}
.loc-search-input:focus { border-color:#ff6600; }
.loc-dropdown {
  display:none;position:absolute;top:100%;left:0;right:0;z-index:9999;
  background:white;border:1.5px solid #e5e7eb;border-radius:12px;
  box-shadow:0 8px 24px rgba(0,0,0,0.12);max-height:260px;overflow-y:auto;
  margin-top:4px;
}
.loc-dropdown.open { display:block; }
.loc-option {
  padding:11px 14px;font-size:14px;cursor:pointer;color:#374151;
  transition:.15s;border-bottom:1px solid #f0f0f0;
}
.loc-option:hover { background:#fff4ee;color:#ff6600; }
.loc-option:last-child { border-bottom:none; }

</style>

</head>
<body>

<header class="topbar">
<a href="index.html"><img src="my_logo.png" alt="ZiBuy" id="secret-admin-trigger" style="height:45px;width:auto;cursor:pointer"></a>
</header>

<div class="checkout-wrap">
  <div class="checkout-container">
    <h1>🛒 Checkout</h1>

    <div class="checkout-grid">
      <!-- Order Summary -->
      <div class="order-summary">
        <h2>Order Summary</h2>

<div class="summary-line">
  <span>ZiBuy Fee (3%):</span>
  <span id="platform-fee">UGX 0</span>
</div>

        <div id="order-items"></div>
        <div class="summary-line">
          <span>Subtotal:</span>
          <span id="subtotal">UGX 0</span>
        </div>
        <div class="summary-line">
          <span>Delivery:</span>
          <span id="delivery">UGX 0</span>
        </div>
        <div class="summary-line" style="border-top:2px solid #e5e7eb;padding-top:12px;font-weight:800;font-size:18px">
          <span>Total:</span>
          <span id="total-price" style="color:#ff6600">UGX 0</span>
        </div>
      </div>

      <!-- Payment Form -->
      <div class="payment-form">
        <h2>Delivery & Payment</h2>

        <div class="form-section">
          <h3>Delivery Address</h3>
          <input type="text" id="delivery-name" placeholder="Full Name" required>
          <input type="tel" id="delivery-phone" placeholder="Phone Number" required>
          <input type="text" id="delivery-address" placeholder="Street Address" required>

          <select id="delivery-district" required>
        <label style="display:block;font-size:12px;font-weight:800;
          color:#374151;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">
          📍 District / City
        </label>
        <!-- Hidden real value -->
        <input type="hidden" id="ad-district">
        <div class="loc-search-wrap" style="margin-bottom:12px">
          <input class="loc-search-input" id="ad-district-input"
            placeholder="🔍 Search district e.g. Kampala, Gulu...">
          <div class="loc-dropdown" id="ad-district-dropdown"></div>
        </div>

        <div id="ad-sublocation-wrap" style="display:none">
          <label style="display:block;font-size:12px;font-weight:800;
            color:#374151;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">
            🏘️ Town / Village / Area
          </label>
          <input type="hidden" id="ad-sublocation">
          <div class="loc-search-wrap">
            <input class="loc-search-input" id="ad-sublocation-input"
              placeholder="🔍 Search town, village, trading centre...">
            <div class="loc-dropdown" id="ad-sublocation-dropdown"></div>
          </div>
        </div>
      </div>

        <div class="form-section">
          <h3>Payment Method</h3>
          <div style="background:#e7f9ef;border:1px solid #86efac;padding:16px;border-radius:12px;display:flex;align-items:center;gap:12px">
            <span style="font-size:28px">💬</span>
            <div>
              <p style="margin:0;font-weight:800;color:#166534">Pay via WhatsApp</p>
              <p style="margin:4px 0 0;font-size:13px;color:#15803d">MTN / Airtel Money · confirmed by our team</p>
            </div>
          </div>
        </div>

        <div id="payment-details"></div>

        <button onclick="placeOrder()" class="checkout-btn" style="width:100%;padding:16px;font-size:16px;margin-top:20px">
          Place Order
        </button>
      </div>
    </div>
  </div>
</div>

<div id="overlay" class="overlay"></div>
<div id="toast-container" class="toast-container"></div>

<script type="module" src="notifications-setup.js"></script>

<script src="nav.js"></script>

<script type="module" src="payment.js"></script>
</body>
</html>
