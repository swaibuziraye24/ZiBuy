<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ZiBuy</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="topbar">

    <h1 class="logo">ZiBuy</h1>

    <input
      type="text"
      placeholder="Search products..."
      class="search-box"
    >

    <button class="cart-btn">
      Cart (0)
    </button>

  </header>

  <main>

  <section class="hero">
    <h2>Welcome to ZiBuy</h2>
    <p>Shop smarter across Uganda.</p>
  </section>

  <section id="products" class="products-grid"></section>

</main>


  <script type="module" src="app.js"></script>

</body>
</html>
