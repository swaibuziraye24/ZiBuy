<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages — ZiBuy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <a href="index.html"><h1 class="logo">Zi<span>Buy</span></h1></a>
  <div class="topbar-actions" style="margin-left:auto">
    <button class="btn btn-dark" onclick="window.location.href='dashboard.html'">← Back</button>
  </div>
</header>

<div class="messages-wrap">
  <aside class="messages-sidebar">
    <h3 style="margin-bottom:14px;font-weight:800">💬 Conversations</h3>
    <div id="conversations-list" style="display:flex;flex-direction:column;gap:6px"></div>
  </aside>

  <main class="messages-main">
    <div id="chat-empty" style="text-align:center;padding:60px 20px;color:#6b7280">
      <p style="font-size:32px;margin-bottom:12px">💬</p>
      <p>Select a conversation or start messaging</p>
    </div>

    <div id="chat-window" style="display:none;height:100%;display:flex;flex-direction:column">
      <div class="chat-header">
        <h3 id="chat-with-name">Chat</h3>
        <button class="btn btn-outline" onclick="closeChat()" style="padding:6px 12px;font-size:12px">Close</button>
      </div>

      <div id="messages-container" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px"></div>

      <div class="chat-input-area">
        <input type="text" id="message-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()" style="background:#ff6600;color:white;border:none;padding:10px 20px;border-radius:8px;font-weight:700;cursor:pointer">Send</button>
      </div>
    </div>
  </main>
</div>

<div id="overlay" class="overlay" onclick="closeChat()"></div>
<div id="toast-container" class="toast-container"></div>

<script type="module" src="messages.js"></script>
</body>
</html>
